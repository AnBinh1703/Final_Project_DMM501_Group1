name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run unit tests
        run: |
          pytest -q tests/unit tests/data

  integration-and-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run integration tests
        run: |
          pytest -q tests/integration

      - name: Run tests (coverage gate)
        run: |
          pytest -q --cov=src --cov-config=.coveragerc --cov-report=term-missing --cov-fail-under=80
