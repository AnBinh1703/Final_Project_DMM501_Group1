name: Docker

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f deployment/api/Dockerfile -t fraud-api:ci .

      - name: Build frontend image
        run: docker build -f deployment/frontend/Dockerfile -t fraud-frontend:ci .

      - name: Validate docker-compose
        run: docker compose -f deployment/docker-compose.yml config

