services:
  api:
    build:
      context: ..
      dockerfile: deployment/api/Dockerfile
    environment:
      # Generate this with: python -m src.pipelines.train_pipeline --data-path "" --artifacts-dir artifacts
      # Or generate the full real-dataset benchmark artifacts with:
      #   python -m src.pipelines.run_model_workflow --data-path data/archive/creditcard.csv --artifacts-root artifacts
      MODEL_PATH: /app/artifacts/models/final_model.joblib
      # For deployment, prefer using thresholds stored in artifacts/models/model_info.json.
      # If you override them, keep them consistent with that file.
      REVIEW_THRESHOLD: "0.84"
      FRAUD_THRESHOLD: "0.99"
      MODEL_VERSION: creditcard-production-v1
    volumes:
      - ../artifacts:/app/artifacts
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ..
      dockerfile: deployment/frontend/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/index.html"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  mlflow:
    build:
      context: ..
      dockerfile: deployment/mlflow/Dockerfile
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    ports:
      - "5000:5000"

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  mlflow_data:
  grafana_data:
