services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fraud_ops
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud -d fraud_ops"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ..
      dockerfile: deployment/api/Dockerfile
    environment:
      # Generate this with: python -m src.pipelines.train_pipeline --data-path "" --artifacts-dir artifacts
      # Or generate the full real-dataset benchmark artifacts with:
      #   python -m src.pipelines.run_model_workflow --data-path data/archive/creditcard.csv --artifacts-root artifacts
      MODEL_PATH: /app/artifacts/models/final_model.joblib
      # For deployment, prefer using thresholds stored in artifacts/models/model_info.json.
      # (Override only when explicitly demonstrating policy changes.)
      MODEL_VERSION: creditcard-production-v1
      CASE_REPOSITORY_MODE: postgres
      CASE_DB_URL: postgresql+psycopg://fraud:fraud@postgres:5432/fraud_ops
      CASE_DB_AUTO_MIGRATE: "true"
      API_AUTH_ENABLED: "true"
      API_TOKENS: viewer-token:viewer,analyst-token:analyst,admin-token:admin
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_REQUESTS: "240"
      RATE_LIMIT_WINDOW_SECONDS: "60"
    volumes:
      - ../artifacts:/app/artifacts
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ..
      dockerfile: deployment/frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT:-8082}:8080"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/index.html"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  mlflow:
    build:
      context: ..
      dockerfile: deployment/mlflow/Dockerfile
    environment:
      MLFLOW_DB_PATH: /mlflow/mlflow.db
      MLFLOW_URL: http://127.0.0.1:5000/
      MLFLOW_EXPORTER_PORT: "5001"
      MLFLOW_EXPORTER_INTERVAL_SECONDS: "15"
    command: >
      sh -lc "python /app/exporter.py &
      exec mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts"
    volumes:
      - mlflow_data:/mlflow
    ports:
      - "${MLFLOW_PORT:-5000}:5000"

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  mlflow_data:
  grafana_data:
