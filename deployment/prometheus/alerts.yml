groups:
  - name: fraud-api-alerts
    rules:
      - alert: FraudApiHigh5xxErrorRate
        expr: |
          (
            sum(rate(api_requests_total{http_status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(api_requests_total[5m])), 1)
          ) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate on Fraud API"
          description: "More than 5% of requests are 5xx over the last 10 minutes."

      - alert: FraudApiHighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(api_request_latency_seconds_bucket[5m])) by (le)
          ) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on Fraud API"
          description: "p95 request latency is above 0.5 seconds over the last 10 minutes."

      - alert: FraudApiPredictionRateTooLow
        expr: |
          sum(rate(fraud_predictions_total[5m])) < 0.01
        for: 15m
        labels:
          severity: info
        annotations:
          summary: "Prediction traffic is very low"
          description: "Prediction rate is below 0.01 req/s (near idle) for 15 minutes."

      - alert: FraudApiPredictionRateTooHigh
        expr: |
          sum(rate(fraud_predictions_total[5m])) > 50
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Prediction traffic is unusually high"
          description: "Prediction rate is above 50 req/s for 10 minutes."

      - alert: FraudReviewQueueBacklogHigh
        expr: |
          review_queue_size > 200
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Fraud review backlog is growing"
          description: "review_queue_size has remained above 200 for 15 minutes."

      - alert: FraudFalsePositiveSpike
        expr: |
          increase(false_positive_total[30m]) > 25
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "False positives spiked in the last 30 minutes"
          description: "More than 25 cases were marked FALSE_POSITIVE within 30 minutes."

